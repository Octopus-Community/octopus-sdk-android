name: Bug report
description: Report a problem with the Octopus Android SDK
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much as you can — a minimal repro is the fastest path to a fix.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal, ordered steps. A code snippet or a link to a repro repo is ideal.
      placeholder: |
        1. Initialize the SDK with '...'
        2. Call '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include the full error message / stack trace if any.
    validations:
      required: true
  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      description: The `com.octopuscommunity:octopus-sdk` / `octopus-sdk-ui` version from your Gradle dependencies.
      placeholder: "1.12.1"
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device
      description: Device model(s) where the bug occurs (or emulator profile).
      placeholder: "Pixel 9, Samsung Galaxy S24, Android Emulator (Pixel 6 image)"
    validations:
      required: true
  - type: input
    id: android-version
    attributes:
      label: Android version / API level
      placeholder: "Android 15 (API 35)"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Anything else about your setup — AGP / Gradle / Kotlin versions, Compose version, R8/ProGuard enabled, relevant dependencies.
      render: shell
    validations:
      required: false
